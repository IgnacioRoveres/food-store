<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Food Store</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: Arial, sans-serif;
        background: #f5f5f5;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
      }

      .bienvenida {
        text-align: center;
        background: white;
        padding: 3rem;
        border-radius: 16px;
        box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
      }

      h1 {
        font-size: 2.5rem;
        color: #e63946;
        margin-bottom: 1rem;
      }

      p {
        color: #555;
        margin-bottom: 2rem;
        font-size: 1.1rem;
      }

      a {
        background: #e63946;
        color: white;
        padding: 0.8rem 2rem;
        border-radius: 8px;
        text-decoration: none;
        font-size: 1rem;
        font-weight: bold;
      }

      a:hover {
        background: #c1121f;
      }
    </style>
  </head>
  <body>
    <div class="bienvenida">
      <h1>🍕 Food Store</h1>
      <p>Tu tienda de comida online</p>
      <a href="./src/pages/store/home/home.html">Ir al catálogo</a>
    </div>
  </body>
</html>
